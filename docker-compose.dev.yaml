services:
  postgres:
    image: postgres:17-alpine
    container_name: scratch-map-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       scratchmap
      POSTGRES_USER:     scratchmap
      POSTGRES_PASSWORD: scratchmap_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scratchmap -d scratchmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  scratch-map:
    build:
      context: .
      network: host
    container_name: scratch-map-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      ADDRESS:     '0.0.0.0'
      PORT:        3000
      PG_HOST:     postgres
      PG_PORT:     5432
      PG_DATABASE: scratchmap
      PG_USER:     scratchmap
      PG_PASSWORD: scratchmap_dev
      LOG_LEVEL:   INFO

volumes:
  postgres_data:
